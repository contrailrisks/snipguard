name: release-please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Generate a short-lived installation token from a GitHub App.
      # This works for org repos where the org policy blocks GITHUB_TOKEN
      # from creating pull requests.
      #
      # Setup (one-time):
      #   1. Create a GitHub App in the org:
      #      Org Settings → Developer settings → GitHub Apps → New GitHub App
      #      Permissions required:
      #        Contents:       Read & write
      #        Pull requests:  Read & write
      #        Metadata:       Read-only  (added automatically)
      #      Disable "Expire user authorization tokens" is fine to leave on.
      #      Webhook: not needed — uncheck "Active".
      #   2. Install the App on the snipguard repo only.
      #   3. Generate a private key (App settings → "Generate a private key").
      #   4. Add two repository secrets (snipguard → Settings → Secrets):
      #        RELEASE_PLEASE_APP_ID          ← numeric App ID from the App page
      #        RELEASE_PLEASE_APP_PRIVATE_KEY ← contents of the downloaded .pem file
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          release-type: node

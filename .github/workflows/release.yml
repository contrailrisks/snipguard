name: release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for keyless cosign OIDC signing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - run: npm ci

      # Gate releases on passing tests
      - run: npm test

      # ── SBOM ──────────────────────────────────────────────────────────────
      # Scan source tree before packaging; produces an SPDX 2.3 JSON document.
      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          path: .
          format: spdx-json
          output-file: snipguard-${{ github.ref_name }}.sbom.spdx.json
          artifact-name: snipguard-${{ github.ref_name }}.sbom.spdx.json
          upload-artifact: false   # we attach it to the release ourselves

      # ── Package ───────────────────────────────────────────────────────────
      - name: Build extension zip and checksum
        run: |
          zip -r snipguard-${GITHUB_REF_NAME}.zip . \
            --exclude ".git/*" \
            --exclude "node_modules/*" \
            --exclude "tests/*" \
            --exclude ".github/*" \
            --exclude "tools/*" \
            --exclude "*.zip" \
            --exclude "*.sha256" \
            --exclude "*.sig" \
            --exclude "*.pem" \
            --exclude "*.json.sbom*"
          sha256sum snipguard-${GITHUB_REF_NAME}.zip > snipguard-${GITHUB_REF_NAME}.sha256

      # ── Cosign (keyless OIDC) ─────────────────────────────────────────────
      # Signs the zip against the Sigstore Fulcio CA; records in Rekor log.
      # Verify with:
      #   cosign verify-blob \
      #     --certificate snipguard-<tag>.zip.pem \
      #     --signature   snipguard-<tag>.zip.sig \
      #     --certificate-identity-regexp \
      #       "https://github.com/ContrailRisks/snipguard/.github/workflows/release.yml" \
      #     --certificate-oidc-issuer \
      #       "https://token.actions.githubusercontent.com" \
      #     snipguard-<tag>.zip
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign zip with cosign
        run: |
          cosign sign-blob \
            --yes \
            --output-signature snipguard-${GITHUB_REF_NAME}.zip.sig \
            --output-certificate snipguard-${GITHUB_REF_NAME}.zip.pem \
            snipguard-${GITHUB_REF_NAME}.zip

      # ── Release ───────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          generate_release_notes: true
          files: |
            snipguard-${{ github.ref_name }}.zip
            snipguard-${{ github.ref_name }}.sha256
            snipguard-${{ github.ref_name }}.sbom.spdx.json
            snipguard-${{ github.ref_name }}.zip.sig
            snipguard-${{ github.ref_name }}.zip.pem
